<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Снежок — Ночной разбойник</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f1ea;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #5a3e3e;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #777;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0d8d0;
            padding-bottom: 15px;
        }

        .gallery {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 400px;
            margin: 0 auto 25px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            background-color: #eee;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .gallery img.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: #e6dcd3;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            color: #5a3e3e;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #5a3e3e;
            color: #fff;
            transform: translateY(-2px);
        }

        .facts-title {
            font-weight: 600;
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #5a3e3e;
        }

        .fact-box {
            background: #f9f6f2;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .random-btn {
            background: #b34d4d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(179, 77, 77, 0.3);
        }

        .random-btn:hover {
            background: #923d3d;
            transform: translateY(-3px);
        }

        .footer {
            font-size: 0.9rem;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 20px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 2rem; }
            .gallery { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐾 Снежок</h1>
        <div class="subtitle">Маленький кот с большими голубыми глазами</div>

        <div class="gallery" id="gallery">
            <!-- ЗАМЕНИ НАЗВАНИЯ КАРТИНОК НА СВОИ -->
            <!-- Фото 1: В массажёре -->
            <img src="https://github.com/dimaturin528/TurboSnezhok228/blob/main/Ajc46HxH4opUUotGEJ1Zlx0_ylIz0-VLvaai1VaRflz_7jJ56BHiT1MDFBfSdjFEcOGVa-4hf84rrNRT7yfTaUei.jpg" alt="Снежок в массажёре" class="slider-img active">
            <!-- Фото 2: С планшетом -->
            <img src="https://github.com/dimaturin528/TurboSnezhok228/blob/main/4MM52PpjyD6xF65BE0tt5u9FdaT3Bx6j96fhRSCq_FzmPKjJYQXYvbdXESF0H1WP15_HHvm1noIbwoq0RndSnhq0.jpg" alt="Снежок смотрит планшет" class="slider-img">
            <!-- Фото 3: Глазки на диване -->
            <img src="glazki.jpg" alt="Голубые глаза Снежка" class="slider-img">
            <!-- Фото 4: На кресле/диване -->
            <img src="https://github.com/dimaturin528/TurboSnezhok228/blob/main/4AQQmHFHkSwLWT-e_dYjq84qRflzmND0Ks2DtH2u4s2jIMoU8foCw6JCe5H3m6g38xHlvJWuDLvGL608JlchBNQx.jpg" alt="Снежок на месте хозяина" class="slider-img">
            <!-- Фото 5: Под пледом (НОВОЕ!) -->
            <img src="https://github.com/dimaturin528/TurboSnezhok228/blob/main/W0I23jrqqSXew-uXHnGda6Oe0uRPxi_-z_pNInEaZZkooffvmj1ZpV5LaRDjBimVKkzWghCz0OpVCxb9r3AD_FG9.jpg" alt="Снежок прячется под пледом" class="slider-img">
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">⬅ Назад</button>
            <button class="nav-btn" id="nextBtn">Вперёд ➡</button>
        </div>

        <div class="facts-title">✧ А знаешь ли ты? ✧</div>
        <div class="fact-box" id="factDisplay">
            Ночью Снежок устраивает турбо-режим: бегает и прыгает по всему дому!
        </div>
        <button class="random-btn" id="factBtn">Узнать ещё факт 🐱</button>

        <div class="footer">
            Сделано с любовью для Снежка ❄️
        </div>
    </div>

    <script>
        // ЛОГИКА ГАЛЕРЕИ
        const images = document.querySelectorAll('.slider-img');
        let currentImageIndex = 0;

        function showImage(index) {
            images.forEach(img => img.classList.remove('active'));
            images[index].classList.add('active');
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentImageIndex++;
            if (currentImageIndex >= images.length) currentImageIndex = 0;
            showImage(currentImageIndex);
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            currentImageIndex--;
            if (currentImageIndex < 0) currentImageIndex = images.length - 1;
            showImage(currentImageIndex);
        });

        // ОБНОВЛЁННЫЕ ФАКТЫ С ПЛЕДОМ
        const facts = [
            "Снежок обожает смотреть, как ты играешь на PS4! 🎮",
            "У него небесно-голубые глаза, которые завораживают.",
            "Он тайно охотится на чёрный шнурок от зарядки!",
            "Ночью он превращается в ураган, а под утро ищет тепло! 🌪️",
            "Его любимое укрытие — красный массажёр для ног.",
            "Когда он устаёт бесить тебя ночью, он ложится к тебе на диван 🤗",
            "Обожает залипать в планшет, когда там показывают белочек.",
            "Его второе любимое место — зарыться поглубже под тёплый плед и смотреть оттуда 👀"
        ];

        const factDisplay = document.getElementById('factDisplay');
        const factBtn = document.getElementById('factBtn');

        factBtn.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * facts.length);
            factDisplay.textContent = facts[randomIndex];
            factDisplay.style.transform = "scale(0.95)";
            setTimeout(() => {
                factDisplay.style.transform = "scale(1)";
            }, 150);
        });
    </script>
</body>
  </html>
